probe {    
    name: "arping"
    targets {
      file_targets {
        file_path: "/tmp/vips.json"
      }
    }
    additional_label {
       key: "mac"
       value: "@target.label.mac@"
    }
    additional_label {
       key: "static_label"
       value: "static_value"
    }
    type: EXTENSION
    [osprober.arping_probe]{
    }
}
surfacer {    
   prometheus_surfacer {    
       metrics_prefix: "cloudprober_"
   }
   export_as_gauge: true
   add_failure_metric: false
   type: PROMETHEUS
}
surfacer {
   name: "formated_file"
   type: USER_DEFINED
}

